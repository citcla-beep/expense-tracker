<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <span class="logo">💰 Expense Tracker</span>
        <div class="nav-links">
            <button class="nav-btn active" onclick="mostraSezione('dashboard')">Dashboard</button>
            <button class="nav-btn" onclick="mostraSezione('spese')">Spese</button>
            <button class="nav-btn" onclick="mostraSezione('entrate')">Entrate</button>
        </div>
    </nav>

    <!-- CONTENUTO PRINCIPALE -->
    <main>

        <!-- SEZIONE DASHBOARD -->
        <section id="dashboard" class="sezione active">
            <h1>Riepilogo del mese</h1>

            <div class="metric-grid">
                <div class="metric">
                    <p class="metric-label">Entrate</p>
                    <p class="metric-value positivo" id="totale-entrate">€0.00</p>
                </div>
                <div class="metric">
                    <p class="metric-label">Spese</p>
                    <p class="metric-value negativo" id="totale-spese">€0.00</p>
                </div>
                <div class="metric">
                    <p class="metric-label">Saldo</p>
                    <p class="metric-value" id="saldo">€0.00</p>
                </div>
                <div class="metric">
                    <p class="metric-label">Spese pianificate</p>
                    <p class="metric-value" id="spese-pianificate">€0.00</p>
                </div>
            </div>
            <div class="lista-card">
                <h2>Ultimi movimenti</h2>
                <ul id="lista-movimenti"></ul>
            </div>
        </section>

        <!-- SEZIONE SPESE -->
        <section id="spese" class="sezione">
            <h1>Spese</h1>

            <!-- Form per aggiungere una spesa -->
            <div class="form-card">
                <h2>Aggiungi spesa</h2>
                <div class="form-row">
                    <input type="number" id="spesa-importo" placeholder="Importo €" min="0" step="0.01">
                    <select id="spesa-categoria">
                        <option value="">Seleziona categoria</option>
                        <option value="Cibo">Cibo</option>
                        <option value="Trasporti">Trasporti</option>
                        <option value="Casa">Casa</option>
                        <option value="Salute">Salute</option>
                        <option value="Svago">Svago</option>
                        <option value="Abbigliamento">Abbigliamento</option>
                        <option value="Tecnologia">Tecnologia</option>
                        <option value="Sport">Sport</option>
                        <option value="Istruzione">Istruzione</option>
                        <option value="Altro">Altro</option>
                    </select>
                    <input type="date" id="spesa-data">
                    <input type="text" id="spesa-descrizione" placeholder="Descrizione (opzionale)">
                </div>
                <button class="btn-primary" onclick="aggiungiSpesa()">Aggiungi</button>
            </div>
                    <div class="form-card">
            <h2>Cerca spese</h2>
            <div class="form-row">
                <select id="filtro-categoria">
                    <option value="">Tutte le categorie</option>
                    <option value="Cibo">Cibo</option>
                    <option value="Trasporti">Trasporti</option>
                    <option value="Casa">Casa</option>
                    <option value="Salute">Salute</option>
                    <option value="Svago">Svago</option>
                    <option value="Abbigliamento">Abbigliamento</option>
                    <option value="Tecnologia">Tecnologia</option>
                    <option value="Sport">Sport</option>
                    <option value="Istruzione">Istruzione</option>
                    <option value="Altro">Altro</option>
                </select>
                <input type="date" id="filtro-data-inizio" placeholder="Data inizio">
                <input type="date" id="filtro-data-fine" placeholder="Data fine">
                <input type="text" id="filtro-descrizione" placeholder="Cerca nella descrizione">
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-primary" onclick="cercaSpese()">Cerca</button>
                <button class="btn-secondary" onclick="resetFiltri()">Reset</button>
            </div>
        </div>

        
            <!-- Lista spese -->
            <div class="lista-card">
                <h2>Storico spese</h2>
                <ul id="lista-spese"></ul>
            </div>
        </section>

        <!-- SEZIONE ENTRATE -->
        <section id="entrate" class="sezione">
            <h1>Entrate</h1>

            <!-- Form per aggiungere un'entrata -->
            <div class="form-card">
                <h2>Aggiungi entrata</h2>
                <div class="form-row">
                    <input type="number" id="entrata-importo" placeholder="Importo €" min="0" step="0.01">
                    <select id="entrata-fonte">
                        <option value="">Seleziona fonte</option>
                        <option value="Stipendio">Stipendio</option>
                        <option value="Regalo">Regalo</option>
                        <option value="Investimento">Investimento</option>
                        <option value="Altro">Altro</option>
                    </select>
                    <input type="date" id="entrata-data">
                    <input type="text" id="entrata-descrizione" placeholder="Descrizione (opzionale)">
                </div>
                <button class="btn-primary" onclick="aggiungiEntrata()">Aggiungi</button>
            </div>

            <!-- Lista entrate -->
            <div class="lista-card">
                <h2>Storico entrate</h2>
                <ul id="lista-entrate"></ul>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
